<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriConnect Contact</title>
    <link rel="icon" href="https://copilot.microsoft.com/th/id/BCO.db174fe8-fd2b-49b8-9d63-09ced833a041.png">
    <style>
         *{
        margin:0px;
        padding: 0px;
        font-family:cursive;
       }
       h1{
        padding: 10px;
       }
       nav{
        position: fixed;
        top:0px;
        background-color: rgba(0, 0, 0, 0.8);
        height: 80px;
        width: 100%;
        display: flex;
        justify-content: space-between;
        z-index:1000;
       }
       nav ul{
        padding: 20px;
        list-style: none;
        display: flex;
       }
       nav ul li{
        padding: 10px 30px;
        display: block;
       }
       nav ul li a{
        color:aliceblue;
        text-decoration: none;
        
       }
       nav ul li a:hover{
        background-color: cadetblue;
        border-style: hidden;
        border-radius: 10px;
        padding:8px;
        color: aliceblue;
       }
       body{
      background-image: url(https://www.shutterstock.com/image-photo/abstract-watercolor-aquarelle-dry-pencil-600nw-2669890515.jpg); 
      background-size: cover;      
      background-position: center;  
      background-repeat: no-repeat;
      background-attachment: fixed; 
       }
       section{
        text-align: center;
        margin-top:80px;

       }
       input[type="text"]{
        padding:10px 5px;
        margin-bottom: 20px;
        border-radius: 5px;
        border-color: darkslategray;
        box-shadow: 2px 2px 2px;
       }
       input[type="email"]{
        padding:10px 5px;
        margin-bottom: 20px;
        border-radius: 5px;
        border-color: darkslategray;
        box-shadow: 2px 2px 2px;
       }
       textarea{
          padding:0px 20px;
          margin-bottom: 20px;
          border-radius: 5px;
          border-color: darkslategray;
          box-shadow: 2px 2px 2px;
       }
       #submit{
        margin-bottom: 20px;
        padding:5px;
        border-radius: 20px;
        color:cadetblue;
        background-color: rgb(193, 244, 223);
       }
       footer {
      background-color: rgba(0, 0, 0, 0.8);
      color: aliceblue;
      height: 50px;
      text-align: center;
      line-height: 50px;
      margin-top: 40px;
    }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
</head>
<body>
    <nav>
        <h1 class="logo" style="color:whitesmoke;">🌾AgriConnect</h1>

        <ul>
            <li><a href="index.html" >Home</a></li>
            <li><a href="features.html" target="_blank">Features</a></li>                   
            <li><a href="services.html" target="_blank">Services</a></li>
            <li><a href="schemes.html" target="_blank">Schemes</a></li>
            <li><a href="contact.html" target="_blank">Contact</a></li>
            <li><a href="login.html" target="_blank">Login</a></li>
        </ul>
    </nav>
    <section>
      <div class="title">
        <h1>Contact Us</h1>
        <p>Reach out for support,queries or collaboration.</p>
      </div>
      <div class="contact-form">
        <h2>Send a Message</h2>
        <form>
          <input type="text" id="name" placeholder="Enter Name" required><br>
          <input type="email" id="email" placeholder="Enter Email" required><br>
          <textarea rows="5" id="feedback" placeholder="Drop your queries or feedback here..."></textarea><br>
        </form>
        <button id="submit" onclick="task()">Submit</button>
      </div>
    </section>
    <script>
      
      function task(){
        let name=document.getElementById("name").value;
        let email=document.getElementById("email").value;
        let feedback=document.getElementById("feedback").value;
        alert("Hello " +name+ "\nThank You for your feedback \nWe’ll reach out to you at " + email + " soon.");
      }
    </script>
    <footer>
        © 2026 AgriConnect | Smart Agriculture & Rural Development Portal
    </footer>

</body>

</html>
