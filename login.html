       nav{

       }

        body {

      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-box {
      background-color: rgba(255, 255, 255, 0.9);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 2px 2px 2px cadetblue;
      width: 350px;
      text-align: center;
    }
    .login-box h2 {
      margin-bottom: 20px;
      color: darkslategray;
    }
    input {

      width: 100%;
      padding: 10px;
      margin: 10px 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid darkslategray;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 20px;
      background-color: cadetblue;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background-color: teal;
    }
     footer {
      position: absolute;
      bottom: 0px;
      width: 100%;
      height: 50px;
      text-align: center;
      color: white;
      font-size: 14px;
      justify-content: center;
      background-color: rgba(0, 0, 0, 0.8);
    }

    <form>
      <input type="text" id="username" placeholder="Enter Username" required>
      <input type="password" id="password" placeholder="Enter Password" required>
      <button type="submit" onclick="login()">Login</button>
